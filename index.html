<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="La Chatte FC" />
    <meta name="theme-color" content="#07100C" />
    <meta name="screen-orientation" content="portrait" />
    <meta name="full-screen" content="yes" />
    <meta name="browsermode" content="application" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>La Chatte FC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Fige la hauteur réelle de l'app dans une variable CSS, mesurée une
      // seule fois hors ouverture du clavier. iOS recalcule mal 100dvh
      // quand le clavier s'ouvre/se ferme (bug connu) et peut rester
      // bloqué sur une valeur incorrecte après la fermeture. En figeant
      // la hauteur sur une mesure JS stable (mise à jour seulement sur
      // rotation d'écran, jamais sur ouverture/fermeture clavier), l'app
      // n'a plus jamais besoin de recalculer sa hauteur pendant la saisie.
      function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
      }
      setAppHeight();
      window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 300));
      window.addEventListener('load', () => {
        setAppHeight();
        // Re-mesure de sécurité : en mode PWA standalone, l'affichage
        // peut mettre un instant à se stabiliser après le chargement —
        // une mesure prise trop tôt peut figer une hauteur légèrement
        // trop courte, laissant un espace vide permanent en bas.
        setTimeout(setAppHeight, 300);
        setTimeout(setAppHeight, 800);
      });
    </script>
    <script>
      // Force reload when new Service Worker is available
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
        navigator.serviceWorker.getRegistration().then(reg => {
          if (!reg) return;
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available — force reload
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
